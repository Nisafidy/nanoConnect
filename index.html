<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur NanoRéseau</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #1a472a, #2d6a4f);
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }
        .upload-area {
            background: white;
            border: 2px dashed #2d6a4f;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            cursor: pointer;
        }
        .upload-area:hover {
            background: #e8f5e9;
        }
        #folderInput {
            display: none;
        }
        .info-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 12px;
        }
        .info-card {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border-left: 4px solid #2d6a4f;
        }
        .main-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .main-tab-btn {
            background: #e2e8f0;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
        }
        .main-tab-btn.active {
            background: #2d6a4f;
            color: white;
        }
        .sub-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .sub-tab-btn {
            background: #f1f5f9;
            border: none;
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 20px;
        }
        .sub-tab-btn.active {
            background: #40916c;
            color: white;
        }
        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow-x: auto;
            padding: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
        }
        .empty-data {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔋 NanoRéseau Data Analyzer</h1>
        <div>Import d'un dossier NRXXX_JJMMAA1_JJMMAA2</div>
    </div>
    <div class="upload-area" id="uploadArea">
        <div>📁 Cliquez ou déposez un dossier</div>
        <input type="file" id="folderInput" webkitdirectory directory multiple>
    </div>
    <div id="infoSection"></div>
    <div id="mainTabsContainer"></div>
    <div id="subTabsContainer"></div>
    <div id="tablesContent"></div>
    <footer>Parsing C/E/T/EC/EvNR/R avec sauvegarde automatique</footer>
</div>
<script src="parser.js"></script>
<script src="main.js"></script>
</body>
</html>
